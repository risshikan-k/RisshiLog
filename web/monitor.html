<!DOCTYPE html>
<html lang="ja">
<head>
  <script src="config.js"></script>
  <script>const GAS_URL = CONFIG.GAS_URL;</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入退室モニター</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #222; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; }
    .container { width: 90%; max-width: 800px; }
    #standbyView { display: none; flex-direction: column; align-items: center; justify-content: center; animation: fade-in 0.8s; }
    .date-display { font-size: 40px; color: #bdc3c7; margin-bottom: -15px; font-weight: bold; }
    .clock { font-size: 140px; font-weight: bold; margin-bottom: 40px; color: #ecf0f1; text-shadow: 0 0 30px rgba(255,255,255,0.2); }
    .count-box { background: rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 40px 80px; border: 2px solid rgba(255, 255, 255, 0.15); }
    .count-number { font-size: 100px; font-weight: bold; color: #2ecc71; line-height: 1; }
    #notifyView { display: none; background: #333; border-radius: 30px; padding: 60px 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes pop-in { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .status-badge { font-size: 40px; font-weight: bold; padding: 15px 40px; border-radius: 50px; display: inline-block; margin-bottom: 30px; }
    .status-in { background-color: #2ecc71; color: #fff; }
    .status-out { background-color: #f39c12; color: #fff; }
    .name { font-size: 80px; font-weight: bold; margin: 20px 0; }
    .time { font-size: 30px; color: #aaa; }
    .message { font-size: 24px; margin-top: 40px; color: #ccc; }
  </style>
</head>
<body>

  <div class="container">
    <div id="loading">システムを準備中...</div>
    <div id="standbyView">
      <div class="date-display" id="dateDisplay">----年--月--日(--)</div>
      <div class="clock" id="clockDisplay">--:--:--</div>
      <div class="count-box">
        <div class="count-number"><span id="inRoomCount">-</span> 名</div>
      </div>
    </div>
    <div id="notifyView">
      <div id="statusBadge" class="status-badge"></div>
      <div id="nameDisplay" class="name"></div>
      <div id="timeDisplay" class="time"></div>
      <div id="msgDisplay" class="message"></div>
    </div>
  </div>

  <script>
    let lastDataString = ""; 
    let currentInRoom = 0;
    let notifyTimeout = null;

    setInterval(() => {
      const now = new Date();
      const days = ["日", "月", "火", "水", "木", "金", "土"];
      document.getElementById('clockDisplay').innerText = now.toLocaleTimeString('ja-JP', { hour12: false });
      document.getElementById('dateDisplay').innerText = `${now.getMonth() + 1}月${now.getDate()}日 (${days[now.getDay()]})`;
    }, 1000);

    async function syncCount() {
      const res = await fetch(GAS_URL + "?mode=get_all_status&t=" + new Date().getTime());
      const users = await res.json();
      currentInRoom = users.filter(u => u.status === 'in').length;
      document.getElementById('inRoomCount').innerText = currentInRoom;
    }

    async function fetchLatest() {
      try {
        const res = await fetch(GAS_URL + "?mode=latest&t=" + new Date().getTime());
        const data = await res.json();
        if (!data || data.empty) return;
        const currentDataString = JSON.stringify(data);
        if (currentDataString !== lastDataString) {
          lastDataString = currentDataString;
          showPopup(data);
        }
      } catch (e) {}
    }

    function showPopup(data) {
      const statusBadge = document.getElementById('statusBadge');
      const nameDisplay = document.getElementById('nameDisplay');
      const timeDisplay = document.getElementById('timeDisplay');
      const msgDisplay = document.getElementById('msgDisplay');
      let displayTime = 5000;

      // --- 初回登録時の特殊表示 ---
      if (data.status.includes("登録完了")) {
        const parts = data.status.split('|');
        statusBadge.innerText = "✨ 登録完了";
        statusBadge.className = "status-badge status-in";
        nameDisplay.innerText = "初期設定成功";
        timeDisplay.innerText = "時刻: " + data.time;
        msgDisplay.innerHTML = `
          <div style="font-size:18px; color:#fff; margin-top:15px; text-align:left; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px;">
            ID: <span style="color:#2ecc71; font-family:monospace;">${parts[1]}</span><br>
            URL: <span style="font-size:12px; color:#3498db; word-break:break-all;">${parts[2]}</span>
          </div>`;
        displayTime = 3000; // 登録完了は1秒間表示
      } else {
        if (data.status.includes("入室")) {
          currentInRoom++;
          statusBadge.innerText = "入室しました";
          statusBadge.className = "status-badge status-in";
          msgDisplay.innerText = "頑張りましょう！🔥";
        } else {
          currentInRoom = Math.max(0, currentInRoom - 1);
          statusBadge.innerText = "退出しました";
          statusBadge.className = "status-badge status-out";
          msgDisplay.innerText = "お疲れ様でした！🍵";
        }
        nameDisplay.innerText = data.name + " さん";
        timeDisplay.innerText = data.date + " " + data.time;
      }

      document.getElementById('inRoomCount').innerText = currentInRoom;
      document.getElementById('standbyView').style.display = 'none';
      document.getElementById('notifyView').style.display = 'block';

      if (notifyTimeout) clearTimeout(notifyTimeout); 
      notifyTimeout = setTimeout(() => {
        document.getElementById('notifyView').style.display = 'none';
        document.getElementById('standbyView').style.display = 'flex';
      }, displayTime);
    }

    async function initialize() {
      await syncCount();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('standbyView').style.display = 'flex';
      setInterval(fetchLatest, 1000); // チェックを1秒間隔に高速化
      setInterval(syncCount, 60000);  
    }
    initialize();
  </script>
</body>
</html>
